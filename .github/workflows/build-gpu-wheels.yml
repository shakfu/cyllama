name: build-gpu-wheels

on:
  workflow_dispatch:
    inputs:
      backend:
        description: 'GPU backend to build'
        required: true
        type: choice
        options:
          - cuda
          - rocm
          - sycl
          - vulkan
          - all
      publish_index:
        description: 'Publish to GitHub Pages wheel index'
        required: false
        default: false
        type: boolean

env:
  CIBW_BUILD_VERBOSITY: 1
  CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"
  CIBW_SKIP: "*-musllinux_* *-win32 *-manylinux_i686"

jobs:
  # ---------------------------------------------------------------------------
  # CUDA wheels (Linux only, CUDA 12.8)
  # ---------------------------------------------------------------------------
  build_cuda:
    name: CUDA 12.4 - Linux x86_64
    if: inputs.backend == 'all' || inputs.backend == 'cuda'
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install cibuildwheel
        run: pip install cibuildwheel==3.4.0

      - name: Build CUDA wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_ARCHS_LINUX: x86_64
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux2014
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y git yum-utils &&
            yum-config-manager --add-repo https://developer.download.nvidia.com/compute/cuda/repos/rhel7/x86_64/cuda-rhel7.repo &&
            yum install -y cuda-nvcc-12-4 cuda-cudart-devel-12-4 cuda-driver-devel-12-4 libcublas-devel-12-4 &&
            ln -s /usr/local/cuda-12.4 /usr/local/cuda &&
            /opt/python/cp310-cp310/bin/pip install cmake ninja &&
            PATH=/usr/local/cuda/bin:/opt/python/cp310-cp310/bin:$PATH
            CMAKE_CUDA_ARCHITECTURES="70-real;75-real;80-real;86-real;89-real;90"
            GGML_CUDA=1 GGML_METAL=0
            /opt/python/cp310-cp310/bin/python scripts/manage.py build --all --deps-only
          CIBW_BEFORE_BUILD_LINUX: >
            sed -i 's/^name = "cyllama"/name = "cyllama-cuda12"/' {project}/pyproject.toml
          CIBW_ENVIRONMENT_LINUX: >
            GGML_CUDA=1
            GGML_METAL=0
            CUDA_PATH=/usr/local/cuda
            CMAKE_CUDA_ARCHITECTURES="70-real;75-real;80-real;86-real;89-real;90"
            PATH=/usr/local/cuda/bin:$PATH
            LD_LIBRARY_PATH=/usr/local/cuda/lib64:$LD_LIBRARY_PATH
            CFLAGS=-s
            CXXFLAGS=-s
          CIBW_TEST_COMMAND: ""
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
            auditwheel repair -w {dest_dir} {wheel}
            --exclude libcuda.so.1
            --exclude libcudart.so.12
            --exclude libcublas.so.12
            --exclude libcublasLt.so.12

      - name: List built wheels
        run: ls -lah wheelhouse/

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-cuda-linux-x86_64
          path: ./wheelhouse/*.whl

  # ---------------------------------------------------------------------------
  # ROCm wheels (Linux only, ROCm 6.3)
  # ---------------------------------------------------------------------------
  build_rocm:
    name: ROCm 6.3 - Linux x86_64
    if: inputs.backend == 'all' || inputs.backend == 'rocm'
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install cibuildwheel
        run: pip install cibuildwheel==3.4.0

      - name: Build ROCm wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_ARCHS_LINUX: x86_64
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_BEFORE_ALL_LINUX: >
            dnf install -y git &&
            dnf install -y https://repo.radeon.com/amdgpu-install/6.3.3/rhel/8.10/amdgpu-install-6.3.60303-1.el8.noarch.rpm &&
            dnf install -y rocm-hip-runtime-devel hipblas-devel rocblas-devel libstdc++-static &&
            ls -d /opt/rocm-* | head -1 | xargs -I{} ln -sf {} /opt/rocm &&
            ln -sf /usr/lib/gcc/x86_64-redhat-linux/8/libstdc++.a /opt/rocm/lib/libstdc++.a &&
            /opt/python/cp310-cp310/bin/pip install cmake ninja &&
            PATH=/opt/rocm/bin:/opt/python/cp310-cp310/bin:$PATH
            LIBRARY_PATH=/usr/lib/gcc/x86_64-redhat-linux/8:$LIBRARY_PATH
            CMAKE_HIP_ARCHITECTURES="gfx906;gfx908;gfx90a;gfx942;gfx1030;gfx1100"
            HIP_PATH=/opt/rocm
            GGML_HIP=1 GGML_METAL=0
            /opt/python/cp310-cp310/bin/python scripts/manage.py build --all --deps-only
          CIBW_BEFORE_BUILD_LINUX: >
            sed -i 's/^name = "cyllama"/name = "cyllama-rocm"/' {project}/pyproject.toml
          CIBW_ENVIRONMENT_LINUX: >
            GGML_HIP=1
            GGML_METAL=0
            HIP_PATH=/opt/rocm
            CMAKE_HIP_ARCHITECTURES="gfx906;gfx908;gfx90a;gfx942;gfx1030;gfx1100"
            PATH=/opt/rocm/bin:$PATH
            LD_LIBRARY_PATH=/opt/rocm/lib:$LD_LIBRARY_PATH
            LIBRARY_PATH=/usr/lib/gcc/x86_64-redhat-linux/8:$LIBRARY_PATH
            CFLAGS=-s
            CXXFLAGS=-s
          CIBW_TEST_COMMAND: ""
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
            auditwheel repair -w {dest_dir} {wheel}
            --exclude libamdhip64.so.6
            --exclude libhipblas.so.2
            --exclude librocblas.so.4
            --exclude libhsa-runtime64.so.1

      - name: List built wheels
        run: ls -lah wheelhouse/

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-rocm-linux-x86_64
          path: ./wheelhouse/*.whl

  # ---------------------------------------------------------------------------
  # SYCL wheels (Linux only, Intel oneAPI)
  # ---------------------------------------------------------------------------
  build_sycl:
    name: SYCL - Linux x86_64
    if: inputs.backend == 'all' || inputs.backend == 'sycl'
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install cibuildwheel
        run: pip install cibuildwheel==3.4.0

      - name: Build SYCL wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_ARCHS_LINUX: x86_64
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_BEFORE_ALL_LINUX: >
            dnf install -y git &&
            dnf install -y https://registrationcenter-download.intel.com/akdlm/IRC_NAS/1b9e6e1a-e458-4126-8612-0e3f5f2fe4c8/intel-oneapi-base-toolkit-2025.1.1.18_offline.x86_64.rpm &&
            /opt/python/cp310-cp310/bin/pip install cmake ninja &&
            source /opt/intel/oneapi/setvars.sh &&
            PATH=/opt/python/cp310-cp310/bin:$PATH
            GGML_SYCL=1 GGML_METAL=0
            /opt/python/cp310-cp310/bin/python scripts/manage.py build --all --deps-only
          CIBW_BEFORE_BUILD_LINUX: >
            sed -i 's/^name = "cyllama"/name = "cyllama-sycl"/' {project}/pyproject.toml
          CIBW_ENVIRONMENT_LINUX: >
            GGML_SYCL=1
            GGML_METAL=0
            PATH=/opt/intel/oneapi/compiler/latest/bin:$PATH
            LD_LIBRARY_PATH=/opt/intel/oneapi/compiler/latest/lib:/opt/intel/oneapi/mkl/latest/lib:$LD_LIBRARY_PATH
            CFLAGS=-s
            CXXFLAGS=-s
          CIBW_TEST_COMMAND: ""
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
            auditwheel repair -w {dest_dir} {wheel}
            --exclude libsycl.so.8
            --exclude libOpenCL.so.1
            --exclude libsvml.so
            --exclude libimf.so
            --exclude libintlc.so.5

      - name: List built wheels
        run: ls -lah wheelhouse/

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sycl-linux-x86_64
          path: ./wheelhouse/*.whl

  # ---------------------------------------------------------------------------
  # Vulkan wheels (Linux + Windows)
  # ---------------------------------------------------------------------------
  build_vulkan:
    name: Vulkan - Linux/Windows x86_64
    if: inputs.backend == 'all' || inputs.backend == 'vulkan'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: x86_64
            runner: ubuntu-22.04
            cibw_archs: x86_64
          - os: windows
            arch: x86_64
            runner: windows-2022
            cibw_archs: AMD64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Vulkan SDK (Linux)
        if: matrix.os == 'linux'
        run: |
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt update
          sudo apt install -y vulkan-sdk

      - name: Install Vulkan SDK (Windows)
        if: matrix.os == 'windows'
        run: |
          $ver = "1.3.290.0"
          Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/$ver/windows/VulkanSDK-$ver-Installer.exe" -OutFile VulkanSDK.exe
          Start-Process -FilePath VulkanSDK.exe -ArgumentList "--accept-licenses --default-answer --confirm-command install" -Wait
          echo "VULKAN_SDK=C:\VulkanSDK\$ver" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv (Unix)
        if: matrix.os != 'windows'
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install uv (Windows)
        if: matrix.os == 'windows'
        run: |
          irm https://astral.sh/uv/install.ps1 | iex
          echo "$env:USERPROFILE\.local\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install dependencies (Unix)
        if: matrix.os != 'windows'
        run: GGML_VULKAN=1 GGML_METAL=0 make sync

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows'
        shell: bash
        run: |
          export GGML_VULKAN=1
          export GGML_METAL=0
          scripts/setup.sh
          uv sync

      - name: Install cibuildwheel
        run: pip install cibuildwheel==3.4.0

      - name: Build Vulkan wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux2014
          CIBW_BEFORE_ALL_LINUX: |
            yum install -y cmake ninja-build
          CIBW_BEFORE_BUILD_LINUX: >
            sed -i 's/^name = "cyllama"/name = "cyllama-vulkan"/' {project}/pyproject.toml
          CIBW_BEFORE_BUILD_WINDOWS: >
            powershell -Command "(Get-Content {project}/pyproject.toml) -replace 'name = \"cyllama\"', 'name = \"cyllama-vulkan\"' | Set-Content {project}/pyproject.toml"
          CIBW_ENVIRONMENT_LINUX: >
            GGML_VULKAN=1
            GGML_METAL=0
          CIBW_ENVIRONMENT_WINDOWS: >
            GGML_VULKAN=1
            GGML_METAL=0
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
            auditwheel repair -w {dest_dir} {wheel}
            --exclude libvulkan.so
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: >
            delvewheel repair -w {dest_dir} {wheel}

      - name: List built wheels
        run: ls -lah wheelhouse/
        shell: bash

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-vulkan-${{ matrix.os }}-${{ matrix.arch }}
          path: ./wheelhouse/*.whl

  # ---------------------------------------------------------------------------
  # Collect and optionally publish to GitHub Pages wheel index
  # ---------------------------------------------------------------------------
  collect:
    name: Collect GPU wheels
    needs: [build_cuda, build_rocm, build_sycl, build_vulkan]
    if: always() && !cancelled()
    runs-on: ubuntu-latest

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          pattern: wheels-*

      - name: Organize wheels by backend
        run: |
          shopt -s nullglob
          mkdir -p index

          # CUDA
          wheels=(artifacts/wheels-cuda-*/*.whl)
          if [ ${#wheels[@]} -gt 0 ]; then
            mkdir -p index/cuda
            cp "${wheels[@]}" index/cuda/
          fi

          # ROCm
          wheels=(artifacts/wheels-rocm-*/*.whl)
          if [ ${#wheels[@]} -gt 0 ]; then
            mkdir -p index/rocm
            cp "${wheels[@]}" index/rocm/
          fi

          # SYCL
          wheels=(artifacts/wheels-sycl-*/*.whl)
          if [ ${#wheels[@]} -gt 0 ]; then
            mkdir -p index/sycl
            cp "${wheels[@]}" index/sycl/
          fi

          # Vulkan
          wheels=(artifacts/wheels-vulkan-*/*.whl)
          if [ ${#wheels[@]} -gt 0 ]; then
            mkdir -p index/vulkan
            cp "${wheels[@]}" index/vulkan/
          fi

          echo "=== Wheel index ==="
          find index -name "*.whl" | sort

      - name: Generate PEP 503 index pages
        run: |
          shopt -s nullglob
          for backend_dir in index/*/; do
            [ -d "$backend_dir" ] || continue
            backend=$(basename "$backend_dir")
            mkdir -p "index/${backend}/cyllama"

            # Build file list with hashes
            echo "<!DOCTYPE html><html><body>" > "index/${backend}/cyllama/index.html"
            for whl in "index/${backend}"/*.whl; do
              [ -f "$whl" ] || continue
              filename=$(basename "$whl")
              sha256=$(sha256sum "$whl" | cut -d' ' -f1)
              mv "$whl" "index/${backend}/cyllama/${filename}"
              echo "<a href=\"${filename}#sha256=${sha256}\">${filename}</a><br>" >> "index/${backend}/cyllama/index.html"
            done
            echo "</body></html>" >> "index/${backend}/cyllama/index.html"

            # Root index for this backend
            echo "<!DOCTYPE html><html><body><a href=\"cyllama/\">cyllama</a></body></html>" > "index/${backend}/index.html"
          done

          echo "=== Generated index ==="
          find index -name "*.html" -exec echo {} \; -exec cat {} \; -exec echo \;

      - name: Upload index artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpu-wheel-index
          path: index/

  # ---------------------------------------------------------------------------
  # Publish wheel index to GitHub Pages
  # ---------------------------------------------------------------------------
  publish_index:
    name: Publish to GitHub Pages
    needs: collect
    if: inputs.publish_index
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages

    steps:
      - name: Download index
        uses: actions/download-artifact@v5
        with:
          name: gpu-wheel-index
          path: wheel-index

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: wheel-index

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
