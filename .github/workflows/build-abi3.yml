name: build-abi3 (experimental)

# Experimental abi3 wheel build. Produces one wheel per platform tagged
# cp310-abi3-<plat>, which by spec is importable on CPython 3.10+.
#
# This workflow is gated behind CYLLAMA_ABI3=ON (see docs/dev/abi3.md).
# It runs in parallel to build-cibw.yml and does NOT replace it.
# Trigger manually via workflow_dispatch.

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build abi3 wheels for ${{ matrix.os }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux-intel
            runs-on: ubuntu-latest
          - os: windows-intel
            runs-on: windows-latest
          - os: macos-intel
            runs-on: macos-15-intel
          - os: macos-arm
            runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Cache thirdparty deps
        id: cache-deps
        uses: actions/cache@v5
        with:
          path: thirdparty/
          key: deps-abi3-${{ matrix.os }}-${{ hashFiles('scripts/manage.py', 'pyproject.toml', '.github/workflows/build-abi3.yml') }}

      - name: Build abi3 wheels
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_PLATFORM: ${{ matrix.platform || 'auto' }}
          CIBW_ARCHS: ${{ matrix.archs || 'auto' }}
          # Single build per platform - the resulting wheel is tagged
          # cp310-abi3 and is valid on 3.10+.
          CIBW_BUILD: "cp310-*"
          # Activate the abi3 code path and tell scikit-build-core to
          # tag the wheel accordingly. These two env vars are the entire
          # opt-in: they override pyproject.toml defaults without
          # modifying any checked-in config.
          CIBW_ENVIRONMENT: >-
            SKBUILD_CMAKE_DEFINE=CYLLAMA_ABI3=ON
            SKBUILD_WHEEL_PY_API=cp310

      - uses: actions/upload-artifact@v7
        with:
          name: abi3-wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  # Verify the abi3 wheel actually imports and runs on every Python
  # version in the support range. cibuildwheel only tests on cp310
  # during build, so this cross-version matrix is the real validation.
  cross_version_smoke_test:
    name: Smoke test py${{ matrix.python }} on ${{ matrix.os }}
    needs: build_wheels
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        os: [linux-intel, macos-arm, windows-intel]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          - os: linux-intel
            runs-on: ubuntu-latest
          - os: macos-arm
            runs-on: macos-latest
          - os: windows-intel
            runs-on: windows-latest

    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          allow-prereleases: true

      - name: Download abi3 wheel artifact
        uses: actions/download-artifact@v8
        with:
          name: abi3-wheels-${{ matrix.os }}
          path: wheels

      - name: Cache test model
        id: cache-model
        uses: actions/cache@v5
        with:
          path: models/Llama-3.2-1B-Instruct-Q8_0.gguf
          key: test-model-llama-3.2-1b-q8

      - name: Download test model
        if: steps.cache-model.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p models
          curl -sL https://huggingface.co/unsloth/Llama-3.2-1B-Instruct-GGUF/resolve/main/Llama-3.2-1B-Instruct-Q8_0.gguf \
            -o models/Llama-3.2-1B-Instruct-Q8_0.gguf

      - name: Find abi3 wheel
        id: find-wheel
        shell: bash
        run: |
          # Single abi3 wheel per platform - tagged cp310-abi3-<plat>.
          WHEEL=$(find wheels -name "*abi3*.whl" | head -1)
          if [ -z "$WHEEL" ]; then
            echo "ERROR: no abi3 wheel found in wheels/"
            ls -la wheels/
            exit 1
          fi
          echo "wheel=$WHEEL" >> "$GITHUB_OUTPUT"
          echo "Found abi3 wheel: $WHEEL"

      - name: Install abi3 wheel in clean venv
        shell: bash
        run: |
          python -m venv abi3-venv
          if [ "$RUNNER_OS" = "Windows" ]; then
            source abi3-venv/Scripts/activate
          else
            source abi3-venv/bin/activate
          fi
          python --version
          pip install "${{ steps.find-wheel.outputs.wheel }}"

      - name: Verify extension suffix is .abi3
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            source abi3-venv/Scripts/activate
          else
            source abi3-venv/bin/activate
          fi
          # Every compiled extension module should land with an .abi3
          # suffix; anything ending in cp3XX-<tag>.so would indicate the
          # abi3 build did not take effect.
          python -c "
          import pathlib, cyllama
          root = pathlib.Path(cyllama.__file__).parent
          bad = []
          for p in root.rglob('*.so'):
              if '.abi3.' not in p.name:
                  bad.append(str(p))
          for p in root.rglob('*.pyd'):
              if '.abi3.' not in p.name:
                  bad.append(str(p))
          if bad:
              print('Non-abi3 extensions found:')
              for b in bad:
                  print(f'  {b}')
              raise SystemExit(1)
          print('All compiled extensions are abi3-tagged')
          "

      - name: Smoke test - imports
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            source abi3-venv/Scripts/activate
          else
            source abi3-venv/bin/activate
          fi
          python -c "
          import cyllama
          print(f'cyllama {cyllama.__version__} imported on Python', __import__('sys').version)

          from cyllama import LLM, complete, chat, AsyncLLM
          from cyllama import batch_generate, BatchGenerator
          from cyllama import estimate_gpu_layers, estimate_memory_usage
          from cyllama import GenerationConfig, Response

          from cyllama.llama import llama_cpp
          print('llama_cpp extension loaded')

          from cyllama.agents import ReActAgent, ConstrainedAgent, ContractAgent, tool
          print('agents loaded')

          from cyllama.integrations.openai_compat import OpenAICompatibleClient
          print('integrations loaded')

          try:
              from cyllama.whisper import whisper_cpp
              print('whisper_cpp extension loaded')
          except ImportError as e:
              print(f'whisper_cpp not available: {e}')

          try:
              from cyllama.sd import stable_diffusion
              print('stable_diffusion extension loaded')
          except ImportError as e:
              print(f'stable_diffusion not available: {e}')

          print('All imports passed')
          "

      - name: Smoke test - inference
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            source abi3-venv/Scripts/activate
          else
            source abi3-venv/bin/activate
          fi
          python -c "
          from cyllama import complete

          response = complete(
              'What is 2+2? Reply with just the number.',
              model_path='models/Llama-3.2-1B-Instruct-Q8_0.gguf',
              n_ctx=128,
              max_tokens=16,
          )
          print(f'Response: {response}')
          assert len(str(response).strip()) > 0, 'Empty response from model'
          print('Inference smoke test passed')
          "

  collect_wheels:
    name: Collect all abi3 wheels
    needs: build_wheels
    runs-on: ubuntu-latest
    steps:
      - name: Download all abi3 wheel artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: abi3-wheels-*

      - name: Collect into single directory
        run: |
          mkdir -p dist
          find artifacts -name "*.whl" -exec cp {} dist/ \;
          echo "=== Collected abi3 wheels ==="
          ls -lh dist/

      - uses: actions/upload-artifact@v7
        with:
          name: cyllama-abi3-wheels-all
          path: dist/*.whl
