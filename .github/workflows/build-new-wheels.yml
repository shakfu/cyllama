name: build-new-wheels

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      link_mode:
        description: 'Linking mode'
        required: true
        default: 'dynamic'
        type: choice
        options:
          - dynamic
          - static
      vulkan_macos_intel:
        description: 'Build Vulkan macOS Intel (x86_64)'
        required: false
        default: true
        type: boolean
      vulkan_windows:
        description: 'Build Vulkan Windows (x86_64)'
        required: false
        default: true
        type: boolean
      cuda_windows:
        description: 'Build CUDA 12 Windows (x86_64)'
        required: false
        default: true
        type: boolean

env:
  CIBW_BUILD_VERBOSITY: 1
  CIBW_BUILD: "cp312-*"
  CIBW_SKIP: "*-musllinux_* *-win32 *-manylinux_i686"

jobs:
  # ---------------------------------------------------------------------------
  # Vulkan - macOS Intel (x86_64)
  # Uses MoltenVK (Vulkan over Metal). The Vulkan SDK provides the loader,
  # headers, and glslc. delocate handles wheel repair (no auditwheel issues).
  # ---------------------------------------------------------------------------
  build_vulkan_macos_intel:
    name: Vulkan - macOS Intel (${{ inputs.link_mode }})
    if: inputs.vulkan_macos_intel
    runs-on: macos-15-intel

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache thirdparty deps
        id: cache-deps
        uses: actions/cache@v5
        with:
          path: thirdparty/
          key: deps-vulkan-macos-intel-${{ inputs.link_mode }}-${{ hashFiles('scripts/manage.py', '.github/workflows/build-new-wheels.yml') }}

      - name: Install Vulkan SDK
        run: |
          brew install vulkan-headers vulkan-loader molten-vk shaderc
          echo "Vulkan SDK installed via Homebrew"
          SHADERC_BIN="$(brew --prefix shaderc)/bin"
          VULKAN_PREFIX="$(brew --prefix vulkan-loader)"
          echo "PATH=${SHADERC_BIN}:${PATH}" >> "$GITHUB_ENV"
          echo "VULKAN_SDK=${VULKAN_PREFIX}" >> "$GITHUB_ENV"
          echo "CMAKE_PREFIX_PATH=$(brew --prefix vulkan-headers):$(brew --prefix vulkan-loader):$(brew --prefix molten-vk)" >> "$GITHUB_ENV"
          echo "--- Vulkan paths ---"
          echo "VULKAN_SDK=${VULKAN_PREFIX}"
          echo "glslc: ${SHADERC_BIN}/glslc"
          ${SHADERC_BIN}/glslc --version
          ls -la "${VULKAN_PREFIX}/lib/" 2>/dev/null || echo "No lib dir in vulkan-loader prefix"
          ls -la "$(brew --prefix vulkan-headers)/include/vulkan/" 2>/dev/null | head -5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install cibuildwheel
        run: pip install cibuildwheel==3.4.0

      - name: Build Vulkan wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_ARCHS_MACOS: x86_64
          CIBW_BEFORE_BUILD_MACOS: >
            pip install delocate &&
            sed -i '' 's/^name = "cyllama"/name = "cyllama-vulkan"/' {project}/pyproject.toml &&
            grep -q '^name = "cyllama-vulkan"' {project}/pyproject.toml || { echo "ERROR: sed rename to cyllama-vulkan failed"; exit 1; } &&
            echo "=== Env check: GGML_VULKAN=$GGML_VULKAN GGML_METAL=$GGML_METAL VULKAN_SDK=$VULKAN_SDK ===" &&
            cd {project} &&
            python scripts/manage.py build --all --deps-only --no-sd-examples
            ${{ inputs.link_mode == 'dynamic' && '--dynamic' || '' }} &&
            echo "=== Dynamic libs ===" && ls -la thirdparty/llama.cpp/dynamic/ 2>/dev/null || echo "No dynamic dir" &&
            echo "=== Static libs ===" && ls -la thirdparty/llama.cpp/lib/ 2>/dev/null || echo "No lib dir" &&
            python scripts/manage.py write_build_config
          CIBW_ENVIRONMENT_MACOS: >
            MACOSX_DEPLOYMENT_TARGET=11.0
            GGML_VULKAN=1
            GGML_METAL=0
            GGML_NATIVE=OFF
            WITH_DYLIB=${{ inputs.link_mode == 'dynamic' && '1' || '0' }}
          CIBW_TEST_COMMAND: ""
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >
            delocate-wheel --require-archs {delocate_archs} -w {dest_dir} -v {wheel}
            --exclude libvulkan
            --exclude libMoltenVK

      - name: List built wheels
        run: ls -lah wheelhouse/

      - name: Inspect wheel contents
        run: |
          pip install wheel-inspect 2>/dev/null || pip install pkginfo
          for whl in wheelhouse/*.whl; do
            echo "=== $whl ==="
            python -m zipfile -l "$whl"
            echo ""
          done

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-vulkan-macos-intel
          path: ./wheelhouse/*.whl
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Vulkan - Windows (x86_64)
  # Uses the LunarG Vulkan SDK. delvewheel handles wheel repair.
  # ---------------------------------------------------------------------------
  build_vulkan_windows:
    name: Vulkan - Windows (${{ inputs.link_mode }})
    if: inputs.vulkan_windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache thirdparty deps
        id: cache-deps
        uses: actions/cache@v5
        with:
          path: thirdparty/
          key: deps-vulkan-windows-${{ inputs.link_mode }}-${{ hashFiles('scripts/manage.py', '.github/workflows/build-new-wheels.yml') }}

      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $VK_LATEST = (Invoke-RestMethod -Uri "https://vulkan.lunarg.com/sdk/latest/windows.json").windows
          Write-Host "Latest Vulkan SDK: ${VK_LATEST}"
          $VK_URL = "https://sdk.lunarg.com/sdk/download/${VK_LATEST}/windows/vulkan-sdk.exe"
          Write-Host "Downloading Vulkan SDK from ${VK_URL}..."
          Invoke-WebRequest -Uri $VK_URL -OutFile vulkan-sdk.exe
          Write-Host "Installing Vulkan SDK..."
          Start-Process -FilePath .\vulkan-sdk.exe -ArgumentList "--accept-licenses --default-answer --confirm-command install" -Wait -NoNewWindow
          $VK_PATH = "C:\VulkanSDK\${VK_LATEST}"
          Write-Host "VULKAN_SDK=${VK_PATH}"
          echo "VULKAN_SDK=${VK_PATH}" >> $env:GITHUB_ENV
          echo "${VK_PATH}\Bin" >> $env:GITHUB_PATH
          & "${VK_PATH}\Bin\glslc.exe" --version

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install cibuildwheel
        run: pip install cibuildwheel==3.4.0

      - name: Build Vulkan wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_ARCHS_WINDOWS: AMD64
          CIBW_BEFORE_BUILD_WINDOWS: >
            pip install delvewheel &&
            python -c "import os; t=open('pyproject.toml').read(); open('pyproject.toml','w').write(t.replace('name = \"cyllama\"','name = \"cyllama-vulkan\"',1))" &&
            python -c "t=open('pyproject.toml').read(); assert 'name = \"cyllama-vulkan\"' in t, 'rename failed'" &&
            cd {project} &&
            python scripts/manage.py build --all --deps-only --no-sd-examples &&
            python scripts/manage.py write_build_config
          CIBW_ENVIRONMENT_WINDOWS: >
            GGML_VULKAN=1
            GGML_METAL=0
            GGML_NATIVE=OFF
            WITH_DYLIB=0
          CIBW_TEST_COMMAND: ""
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: >
            delvewheel repair -w {dest_dir} {wheel}

      - name: List built wheels
        shell: bash
        run: ls -lah wheelhouse/

      - name: Inspect wheel contents
        shell: bash
        run: |
          pip install wheel-inspect 2>/dev/null || pip install pkginfo
          for whl in wheelhouse/*.whl; do
            echo "=== $whl ==="
            python -m zipfile -l "$whl"
            echo ""
          done

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-vulkan-windows
          path: ./wheelhouse/*.whl
          retention-days: 14

  # ---------------------------------------------------------------------------
  # CUDA 12 - Windows (x86_64)
  # Uses NVIDIA CUDA Toolkit 12.4. delvewheel handles wheel repair.
  # The windows-latest runner has ~14 GB free; CUDA toolkit install needs ~5 GB.
  # ---------------------------------------------------------------------------
  build_cuda_windows:
    name: CUDA 12.4 - Windows (${{ inputs.link_mode }})
    if: inputs.cuda_windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache thirdparty deps
        id: cache-deps
        uses: actions/cache@v5
        with:
          path: thirdparty/
          key: deps-cuda-windows-${{ inputs.link_mode }}-${{ hashFiles('scripts/manage.py', '.github/workflows/build-new-wheels.yml') }}

      - name: Install CUDA Toolkit 12.4
        uses: Jimver/cuda-toolkit@v0.2.21
        id: cuda-toolkit
        with:
          cuda: '12.4.0'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "visual_studio_integration"]'

      - name: Verify CUDA installation
        shell: bash
        run: |
          echo "CUDA_PATH=$CUDA_PATH"
          nvcc --version
          ls "$CUDA_PATH/lib/x64/" | head -20

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install cibuildwheel
        run: pip install cibuildwheel==3.4.0

      - name: Build CUDA wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_ARCHS_WINDOWS: AMD64
          CIBW_BEFORE_BUILD_WINDOWS: >
            pip install delvewheel &&
            python -c "import os; t=open('pyproject.toml').read(); open('pyproject.toml','w').write(t.replace('name = \"cyllama\"','name = \"cyllama-cuda12\"',1))" &&
            python -c "t=open('pyproject.toml').read(); assert 'name = \"cyllama-cuda12\"' in t, 'rename failed'" &&
            cd {project} &&
            python scripts/manage.py build --all --deps-only --no-sd-examples &&
            python scripts/manage.py write_build_config
          CIBW_ENVIRONMENT_WINDOWS: >
            GGML_CUDA=1
            GGML_METAL=0
            GGML_NATIVE=OFF
            CMAKE_CUDA_ARCHITECTURES="75"
            WITH_DYLIB=0
          CIBW_TEST_COMMAND: ""
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: >
            delvewheel repair -w {dest_dir} {wheel}
            --no-dll nvcuda.dll
            --no-dll cudart64_12.dll
            --no-dll cublas64_12.dll
            --no-dll cublasLt64_12.dll

      - name: List built wheels
        shell: bash
        run: ls -lah wheelhouse/

      - name: Inspect wheel contents
        shell: bash
        run: |
          pip install wheel-inspect 2>/dev/null || pip install pkginfo
          for whl in wheelhouse/*.whl; do
            echo "=== $whl ==="
            python -m zipfile -l "$whl"
            echo ""
          done

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-cuda-windows
          path: ./wheelhouse/*.whl
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Import smoke tests (no GPU required)
  # ---------------------------------------------------------------------------
  smoke_test:
    name: Smoke test - ${{ matrix.platform }}
    needs: [build_vulkan_macos_intel, build_vulkan_windows, build_cuda_windows]
    if: always() && !cancelled() && (needs.build_vulkan_macos_intel.result == 'success' || needs.build_vulkan_windows.result == 'success' || needs.build_cuda_windows.result == 'success')
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: vulkan-macos-intel
            runs-on: macos-15-intel
            artifact: wheels-vulkan-macos-intel
            condition: inputs.vulkan_macos_intel
          - platform: vulkan-windows
            runs-on: windows-latest
            artifact: wheels-vulkan-windows
            condition: inputs.vulkan_windows
          - platform: cuda-windows
            runs-on: windows-latest
            artifact: wheels-cuda-windows
            condition: inputs.cuda_windows

    steps:
      - name: Check if platform was built
        id: check
        shell: bash
        run: |
          if [ "${{ matrix.condition }}" != "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v6
        if: steps.check.outputs.skip != 'true'
        with:
          python-version: "3.12"

      - name: Download wheel artifacts
        if: steps.check.outputs.skip != 'true'
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: wheels

      - name: Find matching wheel
        if: steps.check.outputs.skip != 'true'
        id: find-wheel
        shell: bash
        run: |
          WHEEL=$(find wheels -name "*cp312*" | head -1)
          if [ -z "$WHEEL" ]; then
            WHEEL=$(find wheels -name "*.whl" | head -1)
          fi
          echo "wheel=$WHEEL" >> "$GITHUB_OUTPUT"
          echo "Found wheel: $WHEEL"

      - name: Install wheel in clean venv
        if: steps.check.outputs.skip != 'true'
        shell: bash
        run: |
          python -m venv smoke-venv
          if [ "$RUNNER_OS" = "Windows" ]; then
            source smoke-venv/Scripts/activate
          else
            source smoke-venv/bin/activate
          fi
          pip install "${{ steps.find-wheel.outputs.wheel }}"

      - name: Smoke test - imports
        if: steps.check.outputs.skip != 'true'
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            source smoke-venv/Scripts/activate
          else
            source smoke-venv/bin/activate
          fi
          python -c "
          import cyllama
          print(f'cyllama {cyllama.__version__} imported successfully')

          from cyllama import LLM, complete, chat
          from cyllama.llama import llama_cpp
          print('llama_cpp extension loaded')

          from cyllama.agents import ReActAgent, ConstrainedAgent, ContractAgent, tool
          print('agents loaded')

          try:
              from cyllama.whisper import whisper_cpp
              print('whisper_cpp extension loaded')
          except ImportError as e:
              print(f'whisper_cpp not available: {e}')

          try:
              from cyllama.sd import stable_diffusion
              print('stable_diffusion extension loaded')
          except ImportError as e:
              print(f'stable_diffusion not available: {e}')

          try:
              from cyllama import _backend
              print(f'Backend: cuda={getattr(_backend, \"cuda\", False)}, '
                    f'vulkan={getattr(_backend, \"vulkan\", False)}, '
                    f'metal={getattr(_backend, \"metal\", False)}')
          except ImportError:
              print('No _backend module')

          print('All imports passed')
          "
