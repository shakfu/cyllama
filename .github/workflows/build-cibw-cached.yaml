name: build-cibw-cached

on:
  workflow_dispatch:
    inputs:
      upload_release:
        description: 'Upload wheels to GitHub Release'
        required: false
        default: false
        type: boolean

jobs:
  build_wheels:
    name: Build wheels for ${{ matrix.os }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux-intel
            runs-on: ubuntu-latest
          # - os: linux-arm
          #   runs-on: ubuntu-24.04-arm
          - os: windows-intel
            runs-on: windows-latest
          # - os: windows-arm
          #   runs-on: windows-11-arm
          - os: macos-intel
            # macos-15-intel is the last x86_64 runner
            runs-on: macos-15-intel
          - os: macos-arm
            # macos-14+ (including latest) are ARM64 runners
            runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5

      - name: Cache thirdparty deps
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: thirdparty/
          key: deps-cibw-${{ matrix.os }}-${{ hashFiles('scripts/manage.py', 'pyproject.toml', '.github/workflows/build-cibw-cached.yaml') }}

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_PLATFORM: ${{ matrix.platform || 'auto' }}
          CIBW_ARCHS: ${{ matrix.archs || 'auto' }}

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  collect_wheels:
    name: Collect all wheels
    needs: build_wheels
    runs-on: ubuntu-latest
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          pattern: cibw-wheels-*

      - name: Collect into single directory
        run: |
          mkdir -p dist
          find artifacts -name "*.whl" -exec cp {} dist/ \;
          echo "=== Collected wheels ==="
          ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: cyllama-wheels-all
          path: dist/*.whl

  upload_release:
    name: Upload wheels to GitHub Release
    needs: collect_wheels
    if: inputs.upload_release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download collected wheels
        uses: actions/download-artifact@v5
        with:
          name: cyllama-wheels-all
          path: dist

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(python3 -c "
          import re
          text = open('pyproject.toml').read()
          print(re.search(r'^version\s*=\s*\"([^\"]+)\"', text, re.M).group(1))
          ")
          TAG="${VERSION}"
          echo "Version: ${VERSION}, Tag: ${TAG}"
          gh release create "${TAG}" --prerelease --title "${TAG}" 2>/dev/null || true
          gh release upload "${TAG}" dist/*.whl --clobber
