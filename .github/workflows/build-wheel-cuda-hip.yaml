name: Build Wheels (CUDA & HIP)

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

# on:
#   push:
#     branches:
#       - '*'
#   pull_request:
#     types: ['opened', 'reopened', 'synchronize']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build_wheels_hip_linux:
    name: Build Wheel HIP Linux (abi3) ${{matrix.hip}}
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        # Build only with Python 3.10 for abi3 wheel (compatible with all Python 3.10+)
        pyver: ["3.10"]
        hip: ["6.3.4", "6.4.1"]
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # main
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: false
          
          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: true

      - name: Clone
        id: checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: "recursive"

      - name: Set up Python ${{ matrix.pyver }}
        id: setup-python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.pyver }}

      - name: Start ROCm container
        run: |
          # Get Python location from setup-python
          PYTHON_PATH=$(which python)
          PYTHON_HOME=$(dirname $(dirname $PYTHON_PATH))
          
          # Start the container with Python from host mounted
          docker run -d \
            --name rocm-container \
            -v ${{ github.workspace }}:/workspace \
            -v $PYTHON_HOME:$PYTHON_HOME \
            -e PATH=$PYTHON_HOME/bin:$PATH \
            -w /workspace \
            rocm/dev-ubuntu-22.04:${{ matrix.hip }} \
            sleep infinity
          
          # Verify Python installation in container
          docker exec rocm-container python --version
          docker exec rocm-container pip --version

      - name: System Dependencies
        run: |
          docker exec rocm-container bash -c '
            df -ha
            apt-get update
            apt-get install -y build-essential git cmake libcurl4-openssl-dev libssl-dev patchelf rocblas-dev hipblas-dev rocwmma-dev curl
            apt-get clean
            df -ha
            hipconfig --full
            ls -alh /opt/rocm/lib
          '

      - name: Install Rust
        run: |
          docker exec rocm-container bash -c '
            curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            source $HOME/.cargo/env
            rustc --version
            cargo --version
            # Add cargo to PATH permanently for this container
            echo "export PATH=\$HOME/.cargo/bin:\$PATH" >> $HOME/.bashrc
          '

      - name: Setup Python environment
        run: |
          docker exec rocm-container bash -c '
            python -m pip install --upgrade pip
            python -m pip install build wheel auditwheel
            python -m pip install -r requirements.txt
          '

      - name: Build with native CMake HIP support
        env:
          XLLAMACPP_BUILD_HIP: "1"
          VERSIONEER_CLOSEST_TAG_ONLY: "1"
          VERBOSE: "1"
        run: |
          docker exec -e XLLAMACPP_RELEASE=1 \
                     -e XLLAMACPP_BUILD_HIP=$XLLAMACPP_BUILD_HIP \
                     -e VERSIONEER_CLOSEST_TAG_ONLY=$VERSIONEER_CLOSEST_TAG_ONLY \
                     -e VERBOSE=$VERBOSE \
                     rocm-container bash -l -c '
            python --version
            gcc -v
            cargo --version
            printenv
            git config --global --add safe.directory "*"
            python -m build --wheel
            df -ha
            echo "Clean up"
            rm -rf build
            rm -rf thirdparty
            df -ha
            auditwheel show dist/*.whl
            auditwheel repair --plat manylinux_2_35_x86_64 dist/*.whl -w dist
            rm dist/*-linux_x86_64.whl
            ls -alh dist
          '

      - name: Stop ROCm container and verify wheel files
        if: always()
        run: |
          # Always stop and remove the container
          docker stop rocm-container || true
          docker rm rocm-container || true
          
          # Check if any wheel files exist in the dist directory
          if [ -z "$(ls -A dist/*.whl 2>/dev/null)" ]; then
            echo "❌ No wheel files found in dist directory!"
            echo "Current directory contents:"
            ls -la dist/ 2>/dev/null || echo "No dist directory found"
            exit 1
          fi
          
          echo "✅ Wheel files found in dist directory"

      # - uses: actions/upload-artifact@v4
      #   with:
      #     name: artifacts
      #     path: ./dist/*.whl
      #     overwrite: true

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        with:
          files: dist/*
          tag_name: ${{ github.ref_name }}-rocm-${{matrix.hip}}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  build_wheels_vulkan:
    name: Build Wheel Vulkan ${{ matrix.os }} (abi3)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ["ubuntu-22.04", "macos-15-intel", "windows-2022", "windows-11-arm"]
        # Build with Python 3.10 for abi3 wheel (compatible with all Python 3.10+)
        pyver: ["3.10"]
        vulkan: ["1.4.313.2"]
        exclude:
          # Python 3.10 is not available for Windows ARM64
          - os: "windows-11-arm"
            pyver: "3.10"
        include:
          # Windows ARM64 requires Python 3.14+ (earliest ARM64 build available)
          - os: "windows-11-arm"
            pyver: "3.14"
            vulkan: "1.4.313.2"
    env:
      VULKAN_VERSION: ${{ matrix.vulkan }}
    steps:
      - name: Clone
        id: checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: "recursive"

      - name: Set up Python ${{ matrix.pyver }}
        id: setup-python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.pyver }}

      - name: System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo wget -qO - https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo apt-key add -
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt-get update -y
          sudo apt-get install -y build-essential git cmake libcurl4-openssl-dev libssl-dev patchelf vulkan-sdk mesa-vulkan-drivers

      - name: System Dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        env:
          RUNNER_ARCH: ${{ runner.arch }}
        run: |
           # Install w64devkit for x64 (MinGW toolchain, not available for ARM64)
           if [ "$RUNNER_ARCH" = "X64" ]; then
             curl -L https://github.com/skeeto/w64devkit/releases/download/v1.22.0/w64devkit-1.22.0.zip --output w64devkit.zip
             unzip -q w64devkit.zip -d .
             echo "$(pwd)/w64devkit/bin" >> $GITHUB_PATH
           fi

           # Determine Vulkan SDK platform code based on runner architecture
           # runner.arch is "X64" or "ARM64"; LunarG uses "windows" for X64, "warm" for ARM64
           if [ "$RUNNER_ARCH" = "ARM64" ]; then
             VULKAN_PLATFORM="warm"
           else
             VULKAN_PLATFORM="windows"
           fi

           # Download and install Vulkan SDK
           SDK_URL="https://sdk.lunarg.com/sdk/download/${VULKAN_VERSION}/${VULKAN_PLATFORM}/vulkan_sdk.exe"
           echo "Downloading Vulkan SDK from: $SDK_URL"
           curl.exe -o "$RUNNER_TEMP/VulkanSDK-Installer.exe" -L "$SDK_URL"
           "$RUNNER_TEMP/VulkanSDK-Installer.exe" --accept-licenses --default-answer --confirm-command install
           echo "VULKAN_SDK=C:\VulkanSDK\\${VULKAN_VERSION}" >> $GITHUB_ENV
           echo "C:\VulkanSDK\\${VULKAN_VERSION}\bin" >> $GITHUB_PATH

           # Install Rust ARM64 target if needed
           if [ "$RUNNER_ARCH" = "ARM64" ]; then
             rustup target add aarch64-pc-windows-msvc
             rustup show
           fi

      - name: Configure SPIRV-Headers package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          VULKAN_SDK_CMAKE="${VULKAN_SDK//\\//}"
          SPIRV_HEADERS_PACKAGE_DIR="${RUNNER_TEMP//\\//}/spirv-headers-cmake/SPIRV-Headers"
          SPIRV_INCLUDE_DIR="$VULKAN_SDK_CMAKE/Include"

          if [ ! -f "$SPIRV_INCLUDE_DIR/spirv/unified1/spirv.hpp" ] && \
             [ ! -f "$SPIRV_INCLUDE_DIR/spirv-headers/spirv.hpp" ] && \
             [ ! -f "$SPIRV_INCLUDE_DIR/spirv.hpp" ]; then
            echo "SPIR-V headers were not found under $SPIRV_INCLUDE_DIR"
            find "$SPIRV_INCLUDE_DIR" -maxdepth 3 -iname '*spirv*' -print || true
            exit 1
          fi

          mkdir -p "$SPIRV_HEADERS_PACKAGE_DIR"
          cat > "$SPIRV_HEADERS_PACKAGE_DIR/SPIRV-HeadersConfig.cmake" <<EOF
          set(SPIRV-Headers_FOUND TRUE)
          if (NOT TARGET SPIRV-Headers::SPIRV-Headers)
              add_library(SPIRV-Headers::SPIRV-Headers INTERFACE IMPORTED)
              set_target_properties(SPIRV-Headers::SPIRV-Headers PROPERTIES
                  INTERFACE_INCLUDE_DIRECTORIES "$SPIRV_INCLUDE_DIR")
          endif()
          EOF

          echo "SPIRV_HEADERS_CMAKE_ARG=-DSPIRV-Headers_DIR=$SPIRV_HEADERS_PACKAGE_DIR" >> "$GITHUB_ENV"
          echo "Configured SPIRV-Headers_DIR=$SPIRV_HEADERS_PACKAGE_DIR"

      - name: System Dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          # Download and install Vulkan SDK
          brew install cmake libomp vulkan-headers glslang molten-vk shaderc vulkan-loader vulkan-tools
          # On headless CI runners, vulkaninfo needs an ICD file to avoid Abort trap: 6
          # Try MoltenVK ICD first, fall back to mock ICD from vulkan-tools
          MOLTENVK_ICD="$(brew --prefix molten-vk)/share/vulkan/icd.d/MoltenVK_icd.json"
          MOCK_ICD="$(brew --prefix vulkan-tools)/lib/mock_icd/VkICD_mock_icd.json"
          if [ -f "$MOLTENVK_ICD" ]; then
            echo "VK_ICD_FILENAMES=$MOLTENVK_ICD" >> $GITHUB_ENV
            export VK_ICD_FILENAMES="$MOLTENVK_ICD"
          elif [ -f "$MOCK_ICD" ]; then
            echo "VK_ICD_FILENAMES=$MOCK_ICD" >> $GITHUB_ENV
            export VK_ICD_FILENAMES="$MOCK_ICD"
          fi
          vulkaninfo --summary || echo "Warning: vulkaninfo failed (expected on headless CI), continuing build..."

      - name: Setup Python environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install build wheel
          python -m pip install -r requirements.txt

      - name: Install wheel repair tools (Linux)
        if: runner.os == 'Linux'
        run: python -m pip install auditwheel

      - name: Install wheel repair tools (macOS)
        if: runner.os == 'macOS'
        run: python -m pip install delocate

      - name: Install wheel repair tools (Windows)
        if: runner.os == 'Windows'
        run: python -m pip install delvewheel

      - name: Build Wheel
        env:
          XLLAMACPP_RELEASE: "1"
          XLLAMACPP_BUILD_VULKAN: "1"
          VERSIONEER_CLOSEST_TAG_ONLY: "1"
          VERBOSE: "1"
        shell: bash
        run: |
          if [ "${{ runner.arch }}" = "ARM64" ]; then
            export CMAKE_ARGS="-G Ninja -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_BUILD_TYPE=Release ${SPIRV_HEADERS_CMAKE_ARG:-}"
          else
            export CMAKE_ARGS="${SPIRV_HEADERS_CMAKE_ARG:-}"
          fi
          python --version
          printenv
          git config --global --add safe.directory "*"
          python -m build --wheel

      - name: Repair Wheel (Linux)
        if: runner.os == 'Linux'
        run: |
          auditwheel show dist/*.whl
          auditwheel repair --plat manylinux_2_35_x86_64 dist/*.whl -w dist
          rm dist/*-linux_x86_64.whl
          ls -alh dist

      - name: Repair Wheel (macOS)
        if: runner.os == 'macOS'
        run: |
          delocate-wheel -v dist/*.whl
          ls -alh dist

      - name: Repair Wheel (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m delvewheel repair dist/*.whl -w dist
          dir dist

      # - uses: actions/upload-artifact@v4
      #   with:
      #     name: artifacts-${{ runner.os }}
      #     path: ./dist/*.whl
      #     overwrite: true

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        with:
          files: dist/*
          tag_name: ${{ github.ref_name }}-vulkan-${{ matrix.os }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_wheels_cuda_linux:
    name: Build Wheel CUDA Linux ${{ matrix.platform }} (abi3) ${{ matrix.cuda }}
    runs-on: ${{ matrix.platform }}
    strategy:
      matrix:
        platform: ["ubuntu-22.04", "ubuntu-22.04-arm"]
        # Build only with Python 3.10 for abi3 wheel (compatible with all Python 3.10+)
        pyver: ["3.10"]
        cuda: ["12.8.1", "13.2.0"]
    env:
      CUDAVER: ${{ matrix.cuda }}

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: true

      - name: Clone
        id: checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: "recursive"
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.pyver }}
          cache: 'pip'

      - name: Setup Mamba
        uses: conda-incubator/setup-miniconda@505e6394dae86d6a5c7fbb6e3fb8938e3e863830 # v3.1.1
        with:
          activate-environment: "llamacpp"
          python-version: ${{ matrix.pyver }}
          miniforge-version: latest
          add-pip-as-python-dependency: true
          auto-activate-base: false

      - name: Install Dependencies
        env:
          MAMBA_DOWNLOAD_FAILFAST: "0"
          MAMBA_NO_LOW_SPEED_LIMIT: "1"
        run: |
          # Echo glibc version
          ldd --version

          # First install basic build tools
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev
          
          # Initialize conda for shell
          source $CONDA/etc/profile.d/conda.sh
          
          # Activate the conda environment
          conda activate llamacpp
          
          echo "CONDA_PREFIX after activation: $CONDA_PREFIX"
          
          # Try different CUDA package names and channels
          echo "Attempting to install CUDA ${{ matrix.cuda }}..."
          
          # Extract major.minor version (e.g. 12.4.1 -> 12.4) for sub-package pinning
          CUDA_MAJOR_MINOR=$(echo "${{ matrix.cuda }}" | cut -d. -f1,2)
          mamba install -y -c nvidia "cuda==${{ matrix.cuda }}" "cuda-cudart-dev==${CUDA_MAJOR_MINOR}.*" "cuda-nvcc==${CUDA_MAJOR_MINOR}.*"
          echo "Successfully installed CUDA ${{ matrix.cuda }}"
          
          # Verify cuda_runtime.h exists
          echo "=== Checking cuda_runtime.h ==="
          find $CONDA_PREFIX -name "cuda_runtime.h" || echo "WARNING: cuda_runtime.h not found!"
          
          # Verify CONDA_PREFIX is set
          if [ -z "$CONDA_PREFIX" ]; then
            echo "ERROR: CONDA_PREFIX is not set after conda activation"
            exit 1
          fi
          
          # Install build dependencies
          python -m pip install --upgrade cmake
          python -m pip install build wheel
          python -m pip install -r requirements.txt

          # Verify CMake version
          echo "=== CMake Version ==="
          cmake --version
          
          # Verify CUDA installation
          echo "=== CUDA Installation Check ==="
          echo "CONDA_PREFIX: $CONDA_PREFIX"
          echo "=== CUDA Files in CONDA_PREFIX ==="
          find $CONDA_PREFIX -name "*cuda*" -o -name "*nvcc*" | sort
          echo "=== NVCC Version ==="
          which nvcc || echo "nvcc not found in PATH"
          nvcc --version || echo "nvcc version check failed"
          
          # Set CUDA environment variables
          echo "=== Setting CUDA Environment Variables ==="
          export CUDA_HOME=$CONDA_PREFIX
          export CUDA_PATH=$CONDA_PREFIX
          export CUDA_TOOLKIT_ROOT_DIR=$CONDA_PREFIX
          export LD_LIBRARY_PATH="$CONDA_PREFIX/lib:$LD_LIBRARY_PATH"
          export PATH="$CONDA_PREFIX/bin:$PATH"
          
          # Save to GITHUB_ENV for subsequent steps
          echo "CUDA_HOME=$CUDA_HOME" >> $GITHUB_ENV
          echo "CUDA_PATH=$CUDA_PATH" >> $GITHUB_ENV
          echo "CUDA_TOOLKIT_ROOT_DIR=$CUDA_TOOLKIT_ROOT_DIR" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH" >> $GITHUB_ENV
          echo "PATH=$PATH" >> $GITHUB_ENV

      - name: Verify CUDA Version
        run: |
          source $CONDA/etc/profile.d/conda.sh
          conda activate llamacpp
          nvcc --version | grep "release $(echo ${{ matrix.cuda }} | cut -d. -f1,2)"

      - name: Build Wheel
        run: |
          # Echo glibc version
          ldd --version

          # Initialize conda for shell
          source $CONDA/etc/profile.d/conda.sh
          conda activate llamacpp
          
          echo "=== Build Environment ==="
          echo "System: ${{ matrix.platform }}"
          echo "Python: $(which python)"
          echo "Pip: $(which pip)"
          pip list
          echo "CUDA_HOME: $CUDA_HOME"
          echo "PATH: $PATH"
          echo "LD_LIBRARY_PATH: $LD_LIBRARY_PATH"
          echo "CONDA_PREFIX: $CONDA_PREFIX"
          which nvcc
          nvcc --version
          
          # Set build environment
          cuda_version=${CUDAVER//./}
          cuda_version=${cuda_version:0:${#cuda_version}-1}
          
          # Export build variables
          export XLLAMACPP_RELEASE=1
          export XLLAMACPP_BUILD_CUDA=1
          export VERSIONEER_CLOSEST_TAG_ONLY=1
          export VERBOSE=1

          # CRITICAL: Use the SYSTEM compiler (GCC 11/12 on Ubuntu 22.04) instead
          # of conda's GCC 14.3 for both CMake and wheel builds. Conda installs
          # GCC 14.3 as a dependency of the CUDA toolkit, but its libstdc++ provides
          # CXXABI_1.3.15 symbols that are NOT available on most deployment targets
          # (which typically only have CXXABI_1.3.13). System GCC 11/12 uses only
          # CXXABI_1.3.13 symbols, ensuring broad runtime compatibility.
          # The system GCC fully supports C++17 which is all that's needed.
          export CC=/usr/bin/gcc
          export CXX=/usr/bin/g++
          # CMAKE_ARGS is picked up by scripts/build.py to pass to CMake
          # -DCMAKE_CUDA_HOST_COMPILER ensures nvcc also uses system g++ for
          # host-side compilation, preventing CXXABI_1.3.15 from CUDA objects.
          export CMAKE_ARGS="-DCMAKE_C_COMPILER=/usr/bin/gcc -DCMAKE_CXX_COMPILER=/usr/bin/g++ -DCMAKE_CUDA_HOST_COMPILER=/usr/bin/g++"
          echo "=== Forcing system compiler to avoid CXXABI_1.3.15 dependency ==="
          echo "CC=$CC"
          echo "CXX=$CXX"
          echo "CMAKE_ARGS=$CMAKE_ARGS"
          $CXX --version
          
          python -m build --wheel
          
          echo "CUDA_VERSION=$cuda_version" >> $GITHUB_ENV

      - name: Verify no CXXABI_1.3.15 dependency
        run: |
          echo "=== Checking wheel for CXXABI_1.3.15 dependency ==="
          # Unpack the wheel and inspect all shared libraries
          mkdir -p /tmp/wheel_check
          unzip -o dist/*.whl -d /tmp/wheel_check

          FOUND_CXXABI_1_3_15=0
          for so in $(find /tmp/wheel_check -name "*.so"); do
            echo "--- Checking: $so ---"
            # List all CXXABI version requirements
            objdump -T "$so" 2>/dev/null | grep -i "CXXABI" | sort -u || true
            # Check specifically for CXXABI_1.3.15
            if objdump -T "$so" 2>/dev/null | grep -q "CXXABI_1.3.15"; then
              echo "❌ ERROR: $so depends on CXXABI_1.3.15!"
              FOUND_CXXABI_1_3_15=1
            fi
          done

          rm -rf /tmp/wheel_check

          if [ "$FOUND_CXXABI_1_3_15" -eq 1 ]; then
            echo ""
            echo "❌ FAILURE: Wheel contains shared libraries that depend on CXXABI_1.3.15."
            echo "This symbol is only available in libstdc++ from GCC 14+, which is not"
            echo "present on most deployment targets (e.g. Ubuntu 22.04 ships CXXABI_1.3.13)."
            echo ""
            echo "Ensure the build uses the SYSTEM compiler (/usr/bin/g++) instead of"
            echo "conda's GCC 14.x by setting CC=/usr/bin/gcc and CXX=/usr/bin/g++."
            exit 1
          fi

          echo "✅ No CXXABI_1.3.15 dependency found. Wheel is compatible."

      # - uses: actions/upload-artifact@v4
      #   with:
      #     name: artifacts-cuda-${{ env.CUDA_VERSION }}-${{ matrix.platform }}
      #     path: ./dist/*.whl
      #     overwrite: true

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        with:
          files: dist/*
          tag_name: ${{ github.ref_name }}-cu${{ env.CUDA_VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_wheels_cuda_windows:
    name: Build Wheel CUDA Windows (abi3) ${{ matrix.cuda }}
    runs-on: windows-2022
    strategy:
      matrix:
        # Build only with Python 3.10 for abi3 wheel (compatible with all Python 3.10+)
        pyver: ["3.10"]
        cuda: ["12.8.1", "13.2.0"]
    defaults:
      run:
        shell: bash
    env:
      CUDAVER: ${{ matrix.cuda }}

    steps:
      - name: Clone
        id: checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: "recursive"
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.pyver }}
          cache: 'pip'

      - name: Install python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade cmake
          python -m pip install build wheel delvewheel
          python -m pip install -r requirements.txt

          # Verify CMake version
          echo "=== CMake Version ==="
          cmake --version

      - name: Download and install win64devkit
        run: |
          curl -L https://github.com/skeeto/w64devkit/releases/download/v1.22.0/w64devkit-1.22.0.zip --output w64devkit.zip
          unzip -q w64devkit.zip -d .

      - name: Add w64devkit to PATH
        run: |
          echo "$(pwd)/w64devkit/bin" >> $GITHUB_PATH

      - name: Setup CUDA
        uses: Jimver/cuda-toolkit@3d45d157f327c09c04b50ee6ccdea2d9d017ec76 # v0.2.35
        id: cuda-toolkit
        with:
          use-github-cache: false
          cuda: ${{ matrix.cuda }}

      - name: Build Wheel
        run: |
          cuda_version=${CUDAVER//./}
          cuda_version=${cuda_version:0:${#cuda_version}-1}
          
          export XLLAMACPP_RELEASE=1
          export XLLAMACPP_BUILD_CUDA=1
          export VERSIONEER_CLOSEST_TAG_ONLY=1
          export VERBOSE=1
                    
          python -m build --wheel
          
          # On Windows, we use delvewheel for wheel repair
          python -m delvewheel repair --exclude nvcuda.dll dist/*.whl -w dist
          
          echo "CUDA_VERSION=$cuda_version" >> $GITHUB_ENV

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        with:
          files: dist/*
          tag_name: ${{ github.ref_name }}-cu${{ env.CUDA_VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
